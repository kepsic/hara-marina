name: release-bridge

on:
  push:
    tags: ["bridge-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag (e.g. bridge-v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: marina-bridge-linux-amd64
          - goos: linux
            goarch: arm64
            asset: marina-bridge-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            asset: marina-bridge-linux-armv7
          - goos: darwin
            goarch: arm64
            asset: marina-bridge-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: infra/marina-bridge/go.sum
      - name: build
        working-directory: infra/marina-bridge
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" \
            -o dist/${{ matrix.asset }} ./cmd/marina-bridge
          (cd dist && sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            infra/marina-bridge/dist/${{ matrix.asset }}
            infra/marina-bridge/dist/${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: ls
        run: ls -lah dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
