# marina-bridge config — example
# Generate a real one from https://hara.mervare.app/onboard

slug: "moi"
publish_interval: 30s

marina:
  broker:   "tcp://tcp.railway.app:NNNNN"
  username: "boat-moi"
  password: "REPLACE_ME"
  topic:    "marina/moi/telemetry"

sources:
  cerbo:
    enabled: true
    broker:  "tcp://venus.local:1883"
    vrm_id:  "REPLACE_ME"

  ydwg:
    # Works for both YDWG-02 (gateway) and YDNR-02 (router).
    # YDNR-02: log into the web UI (default admin/admin), open
    # "Servers", enable Server #1 with type=RAW on the port below.
    enabled: false
    address: "192.168.1.10:1457"
    # relay_bank: YDCC-04 Circuit Control bank instance number (1-252, default 1).
    # Must match the bank number configured on the YDCC-04 device itself.
    # relay_bank: 1

  # NMEA 0183 over TCP. Use this for the YDNR-02 Server #1 (default port
  # 1456, data protocol NMEA 0183) — the same one Web Gauges depends on, so
  # it's typically already enabled. Decodes depth, water/cabin temp, cabin
  # humidity, heel, position.
  n0183:
    enabled: false
    address: "192.168.1.10:1456"
